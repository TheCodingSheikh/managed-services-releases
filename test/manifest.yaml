apiVersion: managedservices.thecodingsheikh.io/v1alpha1
kind: Tenant
metadata:
  name: "test-tenant"
  annotations:
    # Backstage catalog discovery
    lab.backstage.io/add-to-catalog: "true"
    lab.backstage.io/system-type: app
    lab.backstage.io/component-type: service
    lab.backstage.io/lifecycle: managed
    lab.backstage.io/title: Test Tenant
    lab.backstage.io/name: test-tenant
    lab.backstage.io/system: tenant
    lab.backstage.io/owners: 'user:default/abdo:admin,user:default/abdo2:edit'
    lab.kubernetes-label-selector: 'app.kubernetes.io/instance=test-tenant'
    # Backstage entity scaffolder plugin
    backstage.io/last-applied-configuration: '{"tenant":"test","owners":[{"role":"admin","subject":"user:default/abdo"},{"role":"edit","subject":"user:default/abdo2"}]}'
    backstage.io/scaffolder-template: template:default/tenant
    backstage.io/immutable-fields: 'tenant'
    backstage.io/scaffolder-edit-roles: 'admin'
spec:
  values:
    tenant: test
    owners:
      - subject: user:default/abdo
        role: admin
      - subject: user:default/abdo2
        role: edit
